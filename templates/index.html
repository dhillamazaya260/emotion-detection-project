<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detector</title>
</head>
<body>
    <h2>Emotion Detector API</h2>
    <input type="text" id="textToAnalyze" placeholder="Enter text to analyze...">
    <button onclick="detectEmotion()">Run Emotion Detector</button>
    <p id="system_response"></p>

    <script>
        function detectEmotion() {
            let text = document.getElementById("textToAnalyze").value;
            fetch(`/emotionDetector?textToAnalyze=${encodeURIComponent(text)}`)
                .then(response => response.text())
                .then(data => {
                    document.getElementById("system_response").innerText = data;
                })
                .catch(error => console.error('Error:', error));
        }
    </script>
</body>
</html>
